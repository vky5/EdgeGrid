services:

  nats:
    image: nats:latest
    container_name: edgegrid_nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js"
    networks:
      - edgegrid-net
    restart: unless-stopped

  coordinator:
    image: edgegrid:latest
    container_name: edgegrid_coordinator
    command: ["/edgegrid", "-server"]
    ports:
      - "8080:8080"
    environment:
      - NATS_URL=nats://nats:4222
      - PORT=8080
    depends_on:
      - nats
    networks:
      - edgegrid-net
    restart: unless-stopped

  worker-1:
    image: edgegrid:latest
    container_name: edgegrid_worker_1
    command: ["/edgegrid", "-client"]
    env_file:
      - .env.worker1
    depends_on:
      - coordinator
    networks:
      - edgegrid-net
    restart: unless-stopped

  worker-2:
    image: edgegrid:latest
    container_name: edgegrid_worker_2
    command: ["/edgegrid", "-client"]
    env_file:
      - .env.worker2
    depends_on:
      - coordinator
    networks:
      - edgegrid-net
    restart: unless-stopped

  worker-3:
    image: edgegrid:latest
    container_name: edgegrid_worker_3
    command: ["/edgegrid", "-client"]
    env_file:
      - .env.worker3
    depends_on:
      - coordinator
    networks:
      - edgegrid-net
    restart: unless-stopped

  worker-4:
    image: edgegrid:latest
    container_name: edgegrid_worker_4
    command: ["/edgegrid", "-client"]
    env_file:
      - .env.worker4
    depends_on:
      - coordinator
    networks:
      - edgegrid-net
    restart: unless-stopped

  worker-5:
    image: edgegrid:latest
    container_name: edgegrid_worker_5
    command: ["/edgegrid", "-client"]
    env_file:
      - .env.worker5
    depends_on:
      - coordinator
    networks:
      - edgegrid-net
    restart: unless-stopped

networks:
  edgegrid-net:
    driver: bridge
